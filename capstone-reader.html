<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Capstone Reader | Roscoe Govan</title>
  <meta
    name="description"
    content="Digital reader for Roscoe Govan's WGU capstone report."
  />
  <link rel="stylesheet" href="style.css" />

  <!-- PDF.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.min.js"></script>
</head>
<body>
  <header class="hero">
    <div class="container">
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="resume.html">Resume</a>
        <a href="projects.html">Projects</a>
        <a href="capstone.html">Capstone</a>
        <a href="contact.html">Contact</a>
        <a href="https://www.linkedin.com/in/roscoegovan" target="_blank" rel="noopener noreferrer" class="external-link">LinkedIn</a>
      </nav>

      <h1>Capstone Reader</h1>
      <p class="subtitle">
        Read my Western Governors University capstone report page by page.
      </p>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container">
        <div class="hero-links">
          <a href="Capstone_Written_Report_RoscoeGovan.pdf" target="_blank" rel="noopener noreferrer">Open PDF</a>
          <a href="Capstone_Written_Report_RoscoeGovan.pdf" download>Download PDF</a>
        </div>
      </div>
    </section>

    <section class="section alt">
      <div class="container">
        <div class="reader-controls">
          <button id="prev-page" type="button">← Previous</button>
          <span id="page-info">Page 1 of ?</span>
          <button id="next-page" type="button">Next →</button>
        </div>

        <div class="book-reader">
          <canvas id="pdf-canvas"></canvas>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 Roscoe Govan. All rights reserved.</p>
    </div>
  </footer>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.2.67/pdf.worker.min.js";

    const url = "Capstone_Written_Report_RoscoeGovan.pdf";
    const canvas = document.getElementById("pdf-canvas");
    const context = canvas.getContext("2d");
    const pageInfo = document.getElementById("page-info");
    const prevButton = document.getElementById("prev-page");
    const nextButton = document.getElementById("next-page");

    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let isRendering = false;
    let pendingPage = null;
    const scale = 1.35;

    function renderPage(pageNum) {
      isRendering = true;

      pdfDoc.getPage(pageNum).then((page) => {
        const viewport = page.getViewport({ scale });
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        const renderContext = {
          canvasContext: context,
          viewport: viewport,
        };

        page.render(renderContext).promise.then(() => {
          isRendering = false;

          if (pendingPage !== null) {
            renderPage(pendingPage);
            pendingPage = null;
          }
        });

        pageInfo.textContent = `Page ${pageNum} of ${totalPages}`;
      });
    }

    function queueRenderPage(pageNum) {
      if (isRendering) {
        pendingPage = pageNum;
      } else {
        renderPage(pageNum);
      }
    }

    function showPrevPage() {
      if (currentPage <= 1) return;
      currentPage--;
      queueRenderPage(currentPage);
    }

    function showNextPage() {
      if (currentPage >= totalPages) return;
      currentPage++;
      queueRenderPage(currentPage);
    }

    pdfjsLib.getDocument(url).promise.then((pdfDoc_) => {
      pdfDoc = pdfDoc_;
      totalPages = pdfDoc.numPages;
      renderPage(currentPage);
    }).catch((error) => {
      pageInfo.textContent = "Could not load PDF. Check file path and filename.";
      console.error(error);
    });

    prevButton.addEventListener("click", showPrevPage);
    nextButton.addEventListener("click", showNextPage);
  </script>
</body>
</html>
