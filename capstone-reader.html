<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Basic character encoding -->
  <meta charset="UTF-8" />

  <!-- Makes the page responsive on phones and tablets -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Browser tab title -->
  <title>Capstone Reader | Roscoe Govan</title>

  <!-- Search / preview description -->
  <meta
    name="description"
    content="Digital reader for Roscoe Govan's WGU capstone report."
  />

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="style.css" />

  <!--
    PDF.js LEGACY BUILD
    ------------------------------------------------------
    This is the browser-friendly version that is more reliable
    for a static GitHub Pages site.
  -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <!-- Page header -->
  <header class="hero">
    <div class="container">
      <!-- Navigation -->
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="resume.html">Resume</a>
        <a href="projects.html">Projects</a>
        <a href="capstone.html">Capstone</a>
        <a href="contact.html">Contact</a>
        <a href="https://www.linkedin.com/in/roscoegovan" target="_blank" rel="noopener noreferrer" class="external-link">LinkedIn</a>
      </nav>

      <h1>Capstone Reader</h1>
      <p class="subtitle">
        Read my Western Governors University capstone report page by page.
      </p>
    </div>
  </header>

  <main>
    <!-- Top actions -->
    <section class="section">
      <div class="container">
        <div class="hero-links">
          <a href="Capstone_Written_Report_RoscoeGovan.pdf" target="_blank" rel="noopener noreferrer">Open PDF</a>
          <a href="Capstone_Written_Report_RoscoeGovan.pdf" download>Download PDF</a>
        </div>
      </div>
    </section>

    <!-- Reader -->
    <section class="section alt">
      <div class="container">
        <div class="reader-controls">
          <button id="prev-page" type="button">← Previous</button>
          <span id="page-info">Loading PDF...</span>
          <button id="next-page" type="button">Next →</button>
        </div>

        <div class="book-reader">
          <canvas id="pdf-canvas"></canvas>
        </div>

        <p class="reader-note" id="reader-status">
          If the reader does not load, use the Open PDF button above.
        </p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>© 2026 Roscoe Govan. All rights reserved.</p>
    </div>
  </footer>

  <script>
    // ----------------------------------------------------
    // PDF FILE PATH
    // ----------------------------------------------------
    // This assumes the PDF is in the ROOT of your repo.
    // If you move it into a folder later, update this path.
    const pdfUrl = "Capstone_Written_Report_RoscoeGovan.pdf";

    // ----------------------------------------------------
    // PDF.js worker setup
    // ----------------------------------------------------
    pdfjsLib.GlobalWorkerOptions.workerSrc =
      "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    // ----------------------------------------------------
    // DOM references
    // ----------------------------------------------------
    const canvas = document.getElementById("pdf-canvas");
    const context = canvas.getContext("2d");
    const pageInfo = document.getElementById("page-info");
    const statusText = document.getElementById("reader-status");
    const prevButton = document.getElementById("prev-page");
    const nextButton = document.getElementById("next-page");

    // ----------------------------------------------------
    // Reader state
    // ----------------------------------------------------
    let pdfDoc = null;
    let currentPage = 1;
    let totalPages = 0;
    let isRendering = false;
    let pendingPage = null;

    // Slightly larger scale for readability
    const scale = 1.4;

    // ----------------------------------------------------
    // Render a single page
    // ----------------------------------------------------
    function renderPage(pageNumber) {
      isRendering = true;

      pdfDoc.getPage(pageNumber).then(function(page) {
        const viewport = page.getViewport({ scale: scale });

        canvas.width = viewport.width;
        canvas.height = viewport.height;

        const renderContext = {
          canvasContext: context,
          viewport: viewport
        };

        page.render(renderContext).promise.then(function() {
          isRendering = false;

          if (pendingPage !== null) {
            const nextPendingPage = pendingPage;
            pendingPage = null;
            renderPage(nextPendingPage);
          }
        });

        pageInfo.textContent = `Page ${pageNumber} of ${totalPages}`;

        prevButton.disabled = pageNumber <= 1;
        nextButton.disabled = pageNumber >= totalPages;
      });
    }

    // ----------------------------------------------------
    // Queue rendering if a page is already rendering
    // ----------------------------------------------------
    function queueRenderPage(pageNumber) {
      if (isRendering) {
        pendingPage = pageNumber;
      } else {
        renderPage(pageNumber);
      }
    }

    // ----------------------------------------------------
    // Navigation handlers
    // ----------------------------------------------------
    function showPreviousPage() {
      if (currentPage <= 1) return;
      currentPage--;
      queueRenderPage(currentPage);
    }

    function showNextPage() {
      if (currentPage >= totalPages) return;
      currentPage++;
      queueRenderPage(currentPage);
    }

    prevButton.addEventListener("click", showPreviousPage);
    nextButton.addEventListener("click", showNextPage);

    // ----------------------------------------------------
    // Load the PDF
    // ----------------------------------------------------
    pdfjsLib.getDocument(pdfUrl).promise
      .then(function(pdf) {
        pdfDoc = pdf;
        totalPages = pdf.numPages;
        statusText.textContent = "Use the arrows to navigate through the report.";
        renderPage(currentPage);
      })
      .catch(function(error) {
        console.error("PDF load error:", error);
        pageInfo.textContent = "Could not load PDF";
        statusText.textContent =
          "The PDF could not be loaded. Confirm the filename and path exactly match the file in your GitHub repo.";
      });
  </script>
</body>
</html>
